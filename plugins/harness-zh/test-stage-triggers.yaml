# Test stage triggers — condition-driven yaml for /harness-zh:run-test
#
# 声明全 9 个 bmad-testarch skill 的**触发类型**。run-test-sprint 主流程**首步**调
# `eval_test_stage_triggers.sh <story-key> <spec-path>` 读本 yaml + 项目 config，
# 输出 JSON `{"t1": bool, "t3": bool, ...}` 决定 stage 跑或 skip。
#
# 本 yaml 被消费的字段（仅此两类 — review 2026-06-10 #15 收口）：
#   - skills.<name>.trigger              — 触发类型（enum 见下）
#   - skills.<name>.conditions.keywords  — keyword_match 类 trigger 的关键词列表
# 其它行为参数的 SoT 在 eval_test_stage_triggers.sh 内（不要在本文件配置）：
#   - 兜底 skill 集（yaml 损坏 / FORCE_DEFAULT=1 时）= 脚本 emit_defaults()
#   - T1 test-design 产物路径、T2 framework node_modules 探测、CI spec glob、
#     test-review 阈值（50）= 脚本各评估段硬编码；项目差异（frontend_dir /
#     e2e_test_subdir / artifacts_root）经 harness-project-config.yaml 生效。
# 历史注记：本文件曾带 defaults.fallback_skills 段与 conditions.target_artifact /
# dedupe_* / *_threshold / *_pattern 等字段 + "占位 ${VAR} 由脚本替换" 的承诺 —
# 全部从未被任何代码消费（双份 SoT 漂移源），已删。
#
# Trigger 类型 enum：
#   always              — 每次 invoke 都触发
#   once_per_project    — 仅当目标产物不存在时触发（幂等）
#   per_story           — 每条 story 触发一次（spec 存在即触发）
#   keyword_match       — story spec 内含 conditions.keywords 任一关键词时触发
#   threshold           — 数量阈值（spec count 等）跨过时触发
#   pattern_match       — 仓库内匹配某 file pattern 且数量跨阈值（如 ≥3 共享 helper）
#   any_match           — 多 condition 之 OR（first_e2e_spec / per_epic_done 等）
#   manual_only         — 永不自动触发；只有 solo-dev 显式调用才跑
#
# fail-open 准则：若本 yaml 损坏 / 字段缺失 → eval 脚本走内置 defaults + WARN
# stderr，**不**阻 run-test-sprint 主流程（与 stage 5.5 graceful skip 同款）。
#
# 跨项目 clone：本 yaml 跟 harness-project-config.yaml 一起复制即可工作；
# 项目特定路径（frontend_dir / e2e_test_subdir）由 project config extra map 提供。

# ----------------------------------------------------------------------------
# skills — 9 个 testarch skill 的触发逻辑
# ----------------------------------------------------------------------------
skills:

  test-design:
    stage: T1
    trigger: once_per_project
    description: epic 级别 risk-based 测试设计；幂等（产物已存在则 skip — 产物路径见 eval 脚本 T1 段）

  framework:
    stage: T2
    trigger: once_per_project
    description: framework lock check；bootstrap.sh 已落（首次跑 e2e 前装 e2e_framework — 探测目标见 eval 脚本 T2 段）

  atdd:
    stage: T3
    trigger: per_story
    description: 每条 story 跑一次；产物 atdd-checklist + spec.ts 红相

  automate:
    stage: T4
    trigger: per_story
    description: e2e 实跑；basic per-story e2e

  nfr:
    stage: T5
    trigger: keyword_match
    description: 故事 spec 含 NFR / 性能 / 安全 / 容量类关键词时触发
    conditions:
      keywords:
        - performance
        - load
        - chaos
        - security
        - reliability
        - sizing
        - NFR
        - benchmark
        - latency
        - throughput

  trace:
    stage: T6
    trigger: keyword_match
    description: 合规 / 审计类关键词触发
    conditions:
      keywords:
        - compliance
        - audit
        - gate
        - regulatory
        - traceability
        - SOC2
        - ISO27001

  ci:
    stage: T-ci
    trigger: any_match
    description: epic 收尾（EVAL_CI_HINT=epic_done）且仓库无 e2e CI workflow 时触发；探测逻辑见 eval 脚本 CI 段

  test-review:
    stage: T-review
    trigger: threshold
    description: 测试套件规模到达阈值时触发评分（阈值 50 硬编码在 eval 脚本 test-review 段）

  teach:
    stage: T-teach
    trigger: manual_only
    description: 永不自动触发；只有 solo-dev 显式调用才跑
